          "name": "Wie viele Kilometer hält eine gewaxste Kette?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Das kommt stark auf Wetter und Gelände an. Bei trockenem Straßenbetrieb ca. 400–600 km. Bei nassem Wetter oder MTB eher 200–300 km. Die Kette selbst hält dank Wachs deutlich länger als mit Öl — oft 6000+ km statt 2000–2500 km."
          }
        },
        {
          "@type": "Question",
          "name": "Muss ich eine neue Kette vor dem Wachsen entfetten?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, unbedingt. Das Werkfett auf neuen Ketten verträgt sich nicht mit dem Wachs. Entfetten mit Isopropanol/Aceton oder im Ultraschallbad."
          }
        },
        {
          "@type": "Question",
          "name": "Heißwachs oder Flüssigwachs — was ist besser?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Heißwachs (Waxcelerate) bildet eine dickere, haltbarere Schicht. Flüssigwachs ist bequemer aufzutragen, hält aber weniger lang. Für maximale Laufleistung und Sauberkeit ist Heißwachs klar überlegen."
          }
        },
        {
          "@type": "Question",
          "name": "Ist PTFE in dem Wachs gesundheitlich bedenklich?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "PTFE ist der bewährteste Festschmierstoff im Hochleistungsbereich — Reibungskoeffizient 0,05–0,07, chemisch inert, kein Klebeeffekt. Bei normaler Anwendung im Heißwachs-Bad ist es unbedenklich."
          }
        },
        {
          "@type": "Question",
          "name": "Kann ich alle Ketten mit Waxcelerate wachsen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja, Waxcelerate ist kompatibel mit allen 9-, 10-, 11- und 12-fach Ketten von Shimano, SRAM und Campagnolo."
          }
        },
        {
          "@type": "Question",
          "name": "Wie pflege ich die Kette nach einer Regenfahrt?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Wachs ist wasserabweisend, aber bei längerem Regen kann es abtragen. Nach intensiver Regenfahrt empfiehlt sich ein Re-Wax. Für die Zwischenzeit kann man auch ein Wachs-Top-Up (z.B. Squirt oder Silca Drip Wax) verwenden."
          }
        },
        {
          "@type": "Question",
          "name": "Muss ich immer alles alte Wachs abmachen bevor ich neu wachse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nein, das ist ein Vorteil von Wachs. Altes Wachs löst sich im heißen Wachsbad von selbst. Einfach Kette eintauchen, das neue Wachs verdrängt das alte."
          }
        },

          }
        }
