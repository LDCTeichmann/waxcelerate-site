    <link rel="apple-touch-icon" href="/images/logo.jpg" />
    <!-- Prevent theme flash: apply saved class before React mounts -->
    <script>
      (function(){
        var t=localStorage.getItem('wx-theme');
        var d=document.documentElement;
        if(t==='dark'||(t===null&&window.matchMedia('(prefers-color-scheme:dark)').matches)){d.classList.add('dark');}
        else if(t==='noir'){d.classList.add('noir');}
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
