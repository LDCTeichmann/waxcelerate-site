      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Ich benutze seit Jahren Kettenöl — warum sollte ich wechseln?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Öl funktioniert. Aber es bindet Schmutz, der wie Schleifpaste zwischen Rollenlager, Kassette und Kettenblättern wirkt — bei jedem Tritt Metallabrieb. Mit Wachs bleibt die Kette trocken: nichts haftet daran, der Antrieb ist nach hundert Kilometern noch sauber. Dazu hält die Kette zwei- bis dreimal länger. Der Umstieg kostet einmalig 1–2 Stunden für die Erstentfettung. Danach ist der Aufwand pro Rewax kaum höher als mit Öl."
          }
        },
        {
          "@type": "Question",
          "name": "Wie viele Kilometer hält eine gewachste Kette?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Bei trockenen Bedingungen ca. 400–600 km. Bei Nässe oder MTB eher 200–350 km. Das Gesamtleben der Kette ist ein anderes: eine gut gepflegte gewachste Kette hält 6.000–12.000 km oder mehr — geölte Ketten oft nur 2.000–3.000 km, weil Schmutz den Antrieb von innen abschleift."
          }
        },
        {
          "@type": "Question",
          "name": "Wie viele Watt spart Heißwachs im Vergleich zu Kettenöl?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In kontrollierten Messungen erzeugt unser PTFE-basiertes Wachs ca. 2,6 Watt Reibungsverlust — Kettenöl unter Realbedingungen ca. 7,5 Watt. Das sind knapp 5 Watt Unterschied an der Kette. Die oft zitierten bis zu 8 Watt stammen aus Tests bei 300–400 Watt Eingangsleistung. Im Alltag etwas weniger — aber kein anderes Schmiermittel kommt an Heißwachs heran."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist der Unterschied zwischen Waxcelerate Classic und Pro?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Classic (Paraffin + PTFE + Stearin) ist die Standardformel: sauber, effizient, ideal von Frühjahr bis Herbst. Pro enthält zusätzlich amorphes Molybdändisulfid (MoS₂) als Hochdruckadditiv — senkt den Reibungskoeffizient nochmals messbar. Pro ist die Wahl für Ganzjahresfahrer, Winterbetrieb und E-Bikes. Im Zweifel: Pro."
          }
        },
        {
          "@type": "Question",
          "name": "Muss ich eine neue Kette vor dem Wachsen entfetten?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja — das ist der wichtigste Schritt. Das Werkfett auf neuen Ketten verhindert, dass das Wachs tief in die Rollenlager eindringt. Entfetten mit Isopropanol, Bremsenreiniger oder im Ultraschallbad. Kette vollständig trocknen, dann erst ins Wachs."
          }
        },
        {
          "@type": "Question",
          "name": "Welche Ausrüstung brauche ich zum Heißwachsen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ein alter Kochtopf oder Reiskocher, ein Draht zum Aufhängen der Kette, Isopropanol für die Erstentfettung und das Kettenwachs selbst. Kein teures Equipment nötig. Zieltemperatur: 85–90 °C."
          }
        },
        {
          "@type": "Question",
          "name": "Heißwachs oder Flüssigwachs — was ist besser?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Flüssigwachs (z.B. Squirt oder Silca Drip Wax) ist einfacher aufzutragen, bleibt aber eher an der Oberfläche. Heißwachs dringt durch Hitze und vollständige Immersion tief in die Gelenke und Rollenlager ein. Ergebnis: niedrigere Reibung, längere Intervalle, weniger Aufwand langfristig."
          }
        },
        {
          "@type": "Question",
          "name": "Kann ich mit gewachster Kette im Regen fahren?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja. Wachs ist wasserabweisend — bei kurzen Regenfahrten passiert wenig. Bei längerem Regen kann die äußere Schutzschicht abtragen, das Innere bleibt aber geschmiert. Kette nach Regenfahrten immer abwischen — gewachste Ketten rosten schneller als geölte, da Wachs weniger Korrosionsschutz bietet. Bei regelmäßigem Winterbetrieb: alle 200–300 km nachwachsen."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist eine Ketten-Rotation und warum drei Ketten?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mit drei Ketten im Wechsel läuft immer eine frisch gewachste auf dem Rad, eine wartet bereit, eine wird gewachst — alle drei auf einmal ca. 15–20 Minuten. Rewax dann nur alle 1.200–1.800 km statt alle 400–500 km. Verschleiß verteilt sich gleichmäßig, Kassette und Kettenblätter leben länger."
          }
        },
        {
          "@type": "Question",
          "name": "Wie erkenne ich, wann meine Kette neu gewachst werden muss?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Der Antrieb klingt trockener, die Kette läuft nicht mehr so geschmeidig — manchmal leises Quietschen. Bei trockenen Bedingungen nach ~400–500 km, bei Nässe nach ~200–300 km. Lieber früher als zu spät."
          }
        },
        {
          "@type": "Question",
          "name": "Ist PTFE im Kettenwachs gesundheitlich bedenklich?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nein — bei normaler Anwendung vollständig unbedenklich. PTFE ist chemisch inert, wird nicht über die Haut aufgenommen. Die einzige potenzielle Gefahr entsteht bei Erhitzung über 260 °C — beim Heißwachsen einer Kette wird das Wachs aber nie über 90 °C erhitzt."
          }
        },
        {
          "@type": "Question",
          "name": "Muss ich beim Nachwachsen immer alles alte Wachs entfernen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nein. Altes Wachs löst sich im heißen Wachsbad von selbst, das neue verdrängt es. Bei regelmäßigen Intervallen genügt ein kurzes Abwischen vor dem Tauchbad. Nur nach Ölkontakt oder starker Verschmutzung muss vollständig neu entfettet werden."
          }
        },
        {
          "@type": "Question",
          "name": "Kann ich alle Fahrradketten mit Waxcelerate wachsen — auch E-Bike?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja. Kompatibel mit allen 9-, 10-, 11- und 12-fach Ketten von Shimano, SRAM, Campagnolo und KMC. Für E-Bikes empfehlen wir Pro mit MoS₂ — das höhere Drehmoment macht Hochdruckadditive sinnvoll."
          }
        },
        {
          "@type": "Question",
          "name": "Kann ich das Wachs in einem normalen Topf schmelzen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja. Ein alter Kochtopf oder Reiskocher funktionieren prima — kein spezielles Gerät nötig. Den Topf danach nicht mehr für Lebensmittel verwenden. Ein Mini-Slow-Cooker ist ideal für konstante Temperatur. Zieltemperatur: 85–90 °C."
          }
        },
        {
          "@type": "Question",
          "name": "Wie breche ich die Kette nach dem ersten Wachsen richtig ein?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nach dem Aushärten sitzt das Wachs fest in allen Gelenken — die Kette fühlt sich steif an. Einfach montieren und 10–15 km fahren. Treten und Schalten drückt das überschüssige Wachs aus den Gliedern, danach läuft die Kette wieder flüssig. Weißes Wachspulver auf der Kette ist ein gutes Zeichen — normaler Abrieb."
          }
        },
        {
          "@type": "Question",
          "name": "Wie viele Anwendungen hält ein 500g Block Kettenwachs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mit einer Kette und regelmäßigen Intervallen ca. 20–30 Rewaxing-Sessions pro 500g Block. Mit dem 3-Ketten-System (alle drei auf einmal) ca. 8–10 Komplettbäder. Bei 500 km Intervall und einer Kette kommst du mit einem 500g Block ca. 10.000–15.000 km weit."
          }
        },
        {
          "@type": "Question",
          "name": "Was ist der Vorteil einer vorgewachsten Kette gegenüber selbst wachsen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Wir entfetten unsere Ketten professionell im Ultraschallbad mit chemischen Reinigungsmitteln, die das Fabrikfett restlos entfernen. Das Wachs haftet damit von der ersten Fahrt an optimal. Eine vorgewachste Kette ist der perfekte Einstieg — du weißt danach genau, wie es sein soll."
          }
        },
        {
          "@type": "Question",
          "name": "Wann muss ich die Fahrradkette komplett ersetzen?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mit einem Kettendehnungsmesser prüfen: bei 0,5% Dehnung öfter messen, bei 0,75% Dehnung wechseln — sonst frisst die gestreckte Kette die Zahnflanken von Kassette und Kettenblatt. Mit Wachs erreichst du diese Grenze deutlich später. Faustregel: gewachste Kette prüfen nach 4.000–5.000 km, geölte nach 2.000 km."
          }
        },
        {
          "@type": "Question",
          "name": "Warum hält das Kettenwachs bei mir nicht lange?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Häufigste Ursache: Erstentfettung nicht vollständig. Shimano-11-fach und manche SRAM-Ketten haben besonders hartnäckiges Werkfett — 2–3 Entfettungsdurchgänge helfen. Zweite Ursache: Wachs zu heiß aufgetragen. Über ~95 °C läuft es zu dünn. Tipp: Kette entnehmen wenn sich gerade eine dünne Haut auf dem Wachs bildet."
          }
        },
        {
          "@type": "Question",
          "name": "Soll ich auch Kassette und Kettenblätter mit Kettenwachs behandeln?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nein — das wäre kontraproduktiv. Wachs gehört in die Kette, nicht auf die Ritzel. Kassette und Kettenblätter einfach sauber halten. Beim Umstieg lohnt sich einmal eine gründliche Kassettenreinigung — alte Ölreste können die frisch gewachste Kette kontaminieren."
          }
        },
        {
          "@type": "Question",
          "name": "Ist Kettenwachs auch für Trekking- und Citybikes geeignet?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ja — für jedes Fahrrad. Wachs funktioniert auf jedem Stahlkettenantrieb. Für Citybikes besonders praktisch: saubere Kette, keine fettigen Hosenbeine, kein Nachschmieren nach jeder Fahrt."
          }
        },
        {
          "@type": "Question",
          "name": "Welche Quick-Links empfehlt ihr für Heißwachs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ein Kettenverschluss ist beim Heißwachsen Pflicht. Shimano und SRAM Quick-Links funktionieren gut (3–5× wiederverwendbar). Connex Quick-Links sind unbegrenzt wiederverwendbar und gelten unter Wachsern als Standard. KMC Missing Links sind ebenfalls empfehlenswert."
          }
        },
        {
          "@type": "Question",
          "name": "Was passiert wenn der Wachstopf mit Öl verunreinigt wurde?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Öl und Wachs mischen sich nicht — Öl schwimmt an der Oberfläche und verhindert, dass das Wachs in neue Ketten eindringt. Bei Ölkontamination das Wachs entsorgen und neu beginnen. Zur Kontrolle: Wachs auf hellem Tuch erstarren lassen — Öl zeigt sich als dunkle Eintrübung."
          }
        }
      ]
    }
